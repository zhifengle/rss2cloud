name: Dispatch Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        type: string
        description: 'Release Tag'
        required: true
      jobType:
        type: choice
        description: 'Job Type'
        default: 'all'
        required: true
        options:
          - all
          - musl
          - darwin
          - windows

env:
  IS_PRERELEASE: ${{ contains(inputs.release_tag, '-alpha') || contains(inputs.release_tag, '-beta') || contains(inputs.release_tag, '-rc') || contains(inputs.release_tag, '-test') }}

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: Release ${{ inputs.release_tag }}
          body_path: ./CHANGELOG.md
          prerelease: ${{ env.IS_PRERELEASE }}

  releases-musl:
    if: ${{ github.event.inputs.jobType == 'musl' || github.event.inputs.jobType == 'all' }}
    name: Release Go Binary
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64]
    steps:
      - uses: actions/checkout@v4
      - uses: wangyoucao577/go-release-action@v1
        with:
          pre_command: 'export CGO_ENABLED=1'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          ldflags: '-s -w -extldflags -static'
          asset_name: rss2cloud-${{ inputs.release_tag }}-${{ matrix.goos }}-${{ matrix.goarch }}-musl
          release_tag: ${{ github.event.inputs.release_tag }}
  releases-darwin:
    if: ${{ github.event.inputs.jobType == 'darwin' || github.event.inputs.jobType == 'all' }}
    name: Release Go Binary
    runs-on: macos-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
          check-latest: true
      - name: Install dependencies
        run: |
          export CGO_ENABLED=1
          mkdir -p ./release-tmp
          go get .
      - name: Build
        run: go build -ldflags "-s -w" -o ./release-tmp/
      - name: Generate tar
        run: |
          mkdir release-ready
          cd ./release-tmp
          tar -zcvf ../release-ready/rss2cloud-${{ inputs.release_tag }}-darwin-arm64.tar.gz *
      - name: Upload Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./release-ready/rss2cloud-${{ inputs.release_tag }}-darwin-arm64.tar.gz
          tag: ${{ inputs.release_tag }}
          prerelease: ${{ env.IS_PRERELEASE }}
          overwrite: true

  releases-windows:
    if: ${{ github.event.inputs.jobType == 'windows' || github.event.inputs.jobType == 'all' }}
    name: Release Go Binary
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      matrix:
        goos: [windows]
        goarch: [amd64]
    steps:
      - uses: actions/checkout@v4
      - uses: wangyoucao577/go-release-action@v1
        with:
          pre_command: 'apt-get update && apt-get install --no-install-recommends -y gcc-mingw-w64-x86-64 && export CGO_ENABLED=1 && export CC=x86_64-w64-mingw32-gcc'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          release_tag: ${{ github.event.inputs.release_tag }}
